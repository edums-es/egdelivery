map $http_user_agent $eg_share_crawler {
    default 0;
    ~*(WhatsApp|facebookexternalhit|Facebot|TelegramBot|Twitterbot|LinkedInBot|Slackbot|Discordbot|SkypeUriPreview) 1;
}

server {
    listen 3000;

    root /usr/share/nginx/html;
    index index.html;

    location ~ ^/loja/([^/?]+) {
        set $restaurant_slug $1;
        if ($eg_share_crawler) {
            return 418;
        }
        try_files $uri $uri/ /index.html;
    }

    error_page 418 = @restaurant_share_preview;

    location @restaurant_share_preview {
        proxy_pass http://backend:8001/api/public/restaurants/$restaurant_slug/share;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
